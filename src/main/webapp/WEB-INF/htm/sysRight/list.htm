<#import "/WEB-INF/htm/common/enum.htm" as enum>
<#import "/WEB-INF/htm/common/page.htm" as page>

<form id="query_form">
<table class="tb_query">
	<tbody>
			<tr>
				<th>资源名(功能权限名)：</th>
				<td>&nbsp;<input type="text" id="sysRight.name"/></td>
			</tr>
			<tr>
				<th>资源状态：</th>
				<td>&nbsp;<input type="text" id="sysRight.status"/></td>
			</tr>
			<tr>
				<th>系统功能URL：</th>
				<td>&nbsp;<input type="text" id="sysRight.url"/></td>
			</tr>
			<tr>
				<th>操作类型编码，用于控制操作类型按钮的出现。
有编码的记录必须唯一。：</th>
				<td>&nbsp;<input type="text" id="sysRight.code"/></td>
			</tr>

	</tbody>
	<tfoot>
		<tr>
			<td colspan="4" align="center">
			<a class="bt_green" id="query_button" href="javascript:search()" >查 询</a>
			<a class="bt_gray" href="javascript:void(0)"  onclick="$('#query_form')[0].reset()">重 置</a></td>
		</tr>
	</tfoot>
</table>
</form>

<div class="separate_div"/>

<table class="tblist f_tblist">
	<caption>
	系统操作资源表列表
	<span class="operate_list">

		<a class="bt_blue_30 f_batch_delete" href="#">批量删除</a>
	</span>
	</caption>
</table>
	
<div id="page.result">

</div>
