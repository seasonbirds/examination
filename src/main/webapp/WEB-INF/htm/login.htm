<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<head>
<meta http-equiv="Content-Language" content="zh-cn" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>${webTitle}</title>
<link rel="stylesheet" href="css/css.css" type="text/css">
<SCRIPT LANGUAGE="JavaScript" src="${webroot}/js/validate.js"></SCRIPT>
<SCRIPT LANGUAGE="JavaScript" src="${webroot}/js/jquery-1.9.1.js"></SCRIPT>
<SCRIPT LANGUAGE="JavaScript" src="${webroot}/js/jquery.iframe-auto-height.plugin.1.9.5.min.js"></SCRIPT>
<SCRIPT LANGUAGE="JavaScript" src="${webroot}/js/jquery.browser.js"></SCRIPT>
<style>
.contentnew{ width:100%; height:100%; background:url(${webroot}/img/login/main_06.jpg) repeat;}
</style>
<script type="text/javascript">

function refresh(){   
	var clsDate = new Date();		
	document.getElementById("codeImg").src="${webroot}/validateCodeServlet?t="+clsDate;
}

function enterEvent(event){
	var key=event.keyCode; 
	if(key==13){//判断是否按下回车键
	login();
	}
}

//用户登陆
function login(){
	if(document.getElementById("user.acct").value.trim()==""){
		alert("请输入用户名");
		document.getElementById("user.acct").focus();
		return;
	}
	if(document.getElementById("user.pwd").value==""){
		alert("请输入密码");
		document.getElementById("user.pwd").focus();
		return;
	}
	if(document.getElementById("validateCode").value==""){
		alert("请输入验证码");
		document.getElementById("validateCode").focus();
		return;
	}
	document.LoginForm.submit();
}
//设置焦点
function setFocus() {
	if(document.getElementById("user.acct").value.trim()==""){
		document.getElementById("user.acct").focus();
	}else{
		document.getElementById("validateCode").focus();
	}
}
function init(){
	<#if responseFlag!=0>
	alert("${ResponseMsg}");
	</#if>
}

function autoFrameheight() { 
	var ifm= document.getElementById("loginFrame"); 
	var subWeb = document.frames ? document.frames["loginFrame"].document : ifm.contentDocument; 
	if(ifm != null && subWeb != null) { 
		autoFrameheight = subWeb.body.scrollWidth; 
		ifm.height = subWeb.body.scrollHeight; 
	}
} /*
var subWeb = document.frames ? document.frames["loginFrame"].document : ifm.contentDocument; 
$('loginFrame').iframeAutoHeight({
  minHeight: subWeb.body.scrollHeight,
  heightOffset: 50
});*/
</script>
</head>
<body onload="setFocus();init();" class="contentnew">
<table cellpadding="0" cellspacing="0" style="width:100%; height:100%;">
<form name="LoginForm" action="${webroot}/login!loginFromWeb.action" focus="user.acct" method="post">
	<tr>
				<td align="center" valign="middle">
					<table width="856" height="238" cellpadding="0" cellspacing="0">
						<tr>
							<td class="jrp">

							</td>
							<td class="jlp" width="460" height="238">
								<table>
									<tr>
										<td width="46">
										</td>
										<td>
											<table>
												<iframe src="http://localhost/vnetoo-cas/auth?service=http%3A%2F%2Flocalhost%2Fexamination/login!frame.action" id="loginFrame" 
												width="330px" height="250px" frameborder="0" scrolling="auto"
												style="-webkit-border-radius: 10px; -moz-border-radius: 10px; border-radius: 10px;"></iframe>
											</table>
										</td>
									</tr>
