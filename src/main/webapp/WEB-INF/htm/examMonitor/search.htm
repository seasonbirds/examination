<#import "/WEB-INF/htm/common/enum.htm" as enum>
<#import "/WEB-INF/htm/common/page.htm" as page>

<form id="query_form" action="${webroot}/examMonitor!query.action">
<table class="tb_query">
	<tbody>
			<tr>
				<th>考试名称</th>
				<td>
					<select id="scopeId" name="monitorInfo.scopeId">
						<option value="">---${resourceBundle("select.header")}---</option>
					</select>
				</td>
				<th>交卷状态</th>
				<td>
					<select id="status" name="monitorInfo.examTime">
						<option value="">---${resourceBundle("select.header")}---</option>
						<option value="0">超时</option>
						<option value="1">未超时</option>
					</select>
				</td>
			</tr>
			<tr>
				<th>学生姓名</th>
				<td>&nbsp;<input type="text" name="monitorInfo.studentName"/></td>
				<th>刷新时间</th>
				<td>
					<select id="refreshTime" onchange="refreshTiming()">
						<option value="0">不自动刷新</option>
						<option value="10">10秒自动刷新</option>
						<option value="30">30秒自动刷新</option>
						<option value="60">1分钟自动刷新</option>
						<option value="300">5分钟自动刷新</option>
					</select>
				</td>
			</tr>

	</tbody>
	<tfoot>
		<tr>
			<td colspan="4" align="center">
			<a class="bt_green" id="query_button" href="javascript:pageQuery()" >查 询</a>
			<a class="bt_gray" href="javascript:void(0)"  onclick="$('#query_form')[0].reset()">重 置</a></td>
		</tr>
	</tfoot>
</table>
</form>

<div class="separate_div"></div>

<table class="tblist f_tblist">
	<caption>
	考试监控列表
	</caption>
</table>
	
<div id="page.result">
	<#include "list.htm">
</div>
		
<@page.navigation/>

<@page.init/>
		

			

<SCRIPT LANGUAGE="JavaScript">
var handlerId=0;
/**
 * 定时刷新查询结果
 */
function refreshTiming(){
	//取消原来的定时刷新
	if(handlerId != 0){
		clearInterval(handlerId);
		handlerId = 0;
	}
	var time = $("#refreshTime").val();
	if(time <=0){
		return;
	}

	handlerId = setInterval(pageQuery, parseInt(time) * 1000);
}

$(function(){
	$.post("${webroot}/appScope!getAppScopeJsonData.action", function(response){
		if(response.result == 0){
			var options = $("#scopeId").html();
			var data = response.data;
			if(data != undefined && data != null && data.length > 0){
				for(var i in data){
					options +="<option value=\"" + data[i].id + "\">" + data[i].name + "</option>";
				}
			}
			$("#scopeId").html(options);
		}else{
			jAlertError("加载考试列表出错");
		}
	},"json");
})

</SCRIPT>
