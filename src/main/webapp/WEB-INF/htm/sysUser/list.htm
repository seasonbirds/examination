<SCRIPT LANGUAGE="JavaScript">
<!--
//查询方法 dragSearch 是否是拖动查询,默认不是
function search(dragSearch){
	
	var map=new Map();	
	map.put("sysUser.acct","'"+document.getElementById("sysUser.acct").value+"'");
	map.put("sysUser.realName","'"+document.getElementById("sysUser.realName").value+"'");
	map.put("sysUser.email","'"+document.getElementById("sysUser.email").value+"'");
	map.put("sysUser.status","'"+document.getElementById("sysUser.status").value+"'");

	paginatorSearch('${webroot}/sysUser!search.action',map,dragSearch);
}

//窗口
var addSysUserFrm=new Frame("新增用户信息表",600,300,"showWnd");
function showWnd(){
	addSysUserFrm.center();
	addSysUserFrm.showModel();
	hiddenWaitBar();
}

//新增用户信息表
function addSysUser(){
	showWaitBar();
	addSysUserFrm.setTitle("新增用户信息表");
	addSysUserFrm.setUrl("${webroot}/SysUser!toCreateOrUpdate.action");
}

//编辑用户信息表
function editSysUser(id){
	showWaitBar();
	addSysUserFrm.setTitle("修改用户信息表信息");
	addSysUserFrm.setUrl("${webroot}/SysUser!toCreateOrUpdate.action?sysUser.id="+id);
}

//删除用户信息表
function removeSysUser(id){
	if(!confirm("确定要删除该记录吗？"))
		return;
		
	showWaitBar();
	jQueryPost("${webroot}/SysUser!remove.action",{
		"sysUser.id":id
		},
		function(status,msg){
			hiddenWaitBar();
			if(status==0){
				cancelAll();
				alertSync("删除用户信息表信息成功！","search");
			}else{
				alertInfo("删除用户信息表信息失败！",msg);
			}
	});	
}

//批量删除操作
function batchDeal(){
	//alert(selectList.toString());
	if(selectList.size()==0){
		jAlertError("没有选中记录");
		return;
	}
	if(!confirm("确定要删除所有选中的 "+selectList.size()+" 个记录吗？"))
		return;
	showWaitBar();	
	jQueryPost("${webroot}/SysUser!batchRemove.action",{
		"sysUser.removeIds":selectList.getData()
		},
		function(status,msg){
			hiddenWaitBar();
			if(status==0){
				cancelAll();
				alertSync("删除用户信息表信息成功！","search");				
			}else{
				alertInfo("删除用户信息表信息失败！",msg);
			}
	});	
}

//-->
</SCRIPT>
