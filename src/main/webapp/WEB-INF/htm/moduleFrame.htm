<script type="text/javascript" src="${webroot}/js/ddaccordion.js"></script>

<script type="text/javascript" src="${webroot}/js/jquery.colorbox-zh.js"></script>
<script type="text/javascript" src="${webroot}/js/jquery.validate.min.js"></script>

</head>
<body>
<div id="main_container"> 
	<div id="main_content">
		<div id="content">
			<input type="hidden" id="moduleName" value="${moduleName!}" />		
			<div id="rightContent">
			</div>
		</div>
		<div class="clear"></div>
	</div>
</div>
</body>
</html>

<script type="text/javascript">
	$(function(){
		var moduleName = $("#moduleName").val();
		switch(moduleName){
			case "keyPoint":
				$('#rightContent').load("${webroot}/examKeyPoint!pickup.action");
				break;
			case "question":
				$('#rightContent').load("${webroot}/examQuestion!search.action");
				break;
			case "simulationExam":
				$('#rightContent').load("${webroot}/specialExamAction!search.action?appScope.type=SIMULATION");
				break;
			case "enrolExam":
				$('#rightContent').load("${webroot}/specialExamAction!search.action?appScope.type=ENROL");
				break;
			case "examManager":
				$('#rightContent').load("${webroot}/appScope!search.action");
				break;
			case "examMonitor":
				$('#rightContent').load("${webroot}/examMonitor!search.action");
				break;
			case "examReview":
				$('#rightContent').load("${webroot}/examReview!search.action");
				break;
			case "scoreManager":
				$('#rightContent').load("${webroot}/scoreManage!search.action");
				break;
			default:
				$('#rightContent').html("非法的模块名");
				break;
		}
	})
</script>
