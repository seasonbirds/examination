<script type="text/javascript">
ddaccordion.init({
	headerclass: "submenuheader", //Shared CSS class name of headers group
	contentclass: "submenu", //Shared CSS class name of contents group
	revealtype: "click", //Reveal content when user clicks or onmouseover the header? Valid value: "click", "clickgo", or "mouseover" 
	mouseoverdelay: 200, //if revealtype="mouseover", set delay in milliseconds before header expands onMouseover
	collapseprev: true, //Collapse previous content (so only one open at any time)? true/false 
	defaultexpanded: [0], //index of content(s) open by default [index1, index2, etc] [] denotes no content
	onemustopen: false, //Specify whether at least one header should be open always (so never all headers closed)
	animatedefault: false, //Should contents open by default be animated into view?
  scrolltoheader: false, //scroll to header each time after it's been expanded by the user?
	persiststate: true, //persist state of opened contents within browser session?
	toggleclass: ["", ""], //Two CSS classes to be applied to the header when it's collapsed and expanded, respectively ["class1", "class2"]
	togglehtml: ["suffix", "<img src='${webroot}/img/sidebar/plus.gif' class='statusicon' />", "<img src='${webroot}/img/sidebar/minus.gif' class='statusicon' />"], //Additional HTML added to the header when it's collapsed and expanded, respectively  ["position", "html1", "html2"] (see docs)
	animatespeed: "fast", //speed of animation: integer in milliseconds (ie: 200), or keywords "fast", "normal", or "slow"
	oninit:function(headers, expandedindices){ //custom code to run when headers have initalized
		//do nothing
	},
	onopenclose:function(header, index, state, isuseractivated){ //custom code to run whenever a header is opened or closed
		reset_left_content_height();//在common.js定义
	}
});
</script>
<script type="text/javascript">
	function loadMain(me) {
		$('#sidebarmenu .submenu li').removeClass('active');
		$(me).parent().addClass('active');
		//var breadcrumb1 = $('#menu .current').html();
		var breadcrumb2 = $(me).parents('.submenu').prev().find('span.submenuTitle').eq(0).html();
		var breadcrumb3 = $(me).html();
		//$('#right_title_context span').empty().append(breadcrumb1 + ' / ' + breadcrumb2 + ' / ' + breadcrumb3);
		$('#right_title_context span').empty().append(breadcrumb2 + ' / ' + breadcrumb3);
	
		// 加载子页面
		//var url = $(me).attr('href') + ' #main > *';
		var url = $(me).attr('href')
		$('#right_content').load(url,function() {
			reset_left_content_height();//在common.js定义
		});
		return false;
  	}

	$(document).ready(function() {
		//loadMain($('#sidebarmenu .submenu li.active > a'));
		$('#sidebarmenu .submenu li>a').click(function () {
		  return loadMain(this);
		});

		//错误提示关闭按钮
		//$('#right_content').on('click','.notice .close',function(){
		//	$(this).parent().remove();	
		//});
		
		//窗口变化事件
		$(window).bind("resize",reset_left_content_height);
		//添加参数
		$(".f_profile_edit").each(function() {
			var url = $(this).attr('href');
			url=append_ajax_true(url);
			$(this).attr('href',url);		
		});
	
		//点击个人信息和个人密码
		//$('.f_profile_edit').colorbox();
	});


</script>
