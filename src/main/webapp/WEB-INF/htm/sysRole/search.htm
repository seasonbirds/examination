<#import "/WEB-INF/htm/common/enum.htm" as enum>
<#import "/WEB-INF/htm/common/page.htm" as page>

<form id="query_form" action="${webroot}/sysRole!query.action">
<table class="tb_query">
	<tbody>
		<tr>
			<th>名称：</th>
			<td>&nbsp;<input type="text" id="sysRole.name" name="sysRole.name"/></td>
		
			<th>状态：</th>
			<td>&nbsp;<@enum.checkbox id="sysRole.statusForQuery" type="com.vnetoo.common.enums.Enabled" default=""/></td>
		</tr>

	</tbody>
	<tfoot>
		<tr>
			<td colspan="4" align="center">
			<a class="bt_green" id="query_button" href="javascript:pageQuery()" >查 询</a>
			<a class="bt_gray" href="javascript:void(0)"  onclick="$('#query_form')[0].reset()">重 置</a></td>
		</tr>
	</tfoot>
</table>
</form>

<div class="separate_div"/>

<table class="tblist f_tblist">
	<caption>
	角色列表
	<span class="operate_list"> 
		<a class="bt_blue_30 f_add_operate" href="${webroot}/sysRole!toCreateOrUpdate.action">添加</a>
		<a class="bt_blue_30 f_batch_delete" href="#">批量删除</a>
	</span>
	</caption>
</table>
	
<div id="page.result">
	<#include "list.htm">
</div>
		
<@page.navigation/>

<@page.init/>
