<table class="tblist f_tblist">
	<caption>
	挑选课程查看知识点	 
	</caption>
</table>
<table class="tblist f_tblist">
	<thead>
		<tr>
			<th>序号</th>
			<th>名称</th> 
			<th>查看</th>
		</tr>
	</thead>
	<tbody>
		<#list courses as item>
		<tr <#if item_index%2==1>class="even"</#if>>
			<td>&nbsp;${item_index+1}</td>
			<td>&nbsp;
			<a onclick="replaceUrl('examKeyPoint!search.action?examKeyPoint.courseId=${item.id}')" href="#">${item.name}</a>
			</td> 
			<td>
			<a onclick="replaceUrl('examKeyPoint!search.action?examKeyPoint.courseId=${item.id}')" href="#"><img src="${webroot}/img/crud/magnifier.png" alt="查看"/></a>
			</td>			
		</tr>
		</#list>
	</tbody>	
</table>
<script type="text/javascript"> 
function replaceUrl(url){
	$('#right_content').load(url,function(){
			reset_left_content_height();//在common.js定义
		});		
}
</script>
